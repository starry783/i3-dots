#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Transparency
#################################

inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 0.9;

inactive-opacity-override = false;

#################################
# Performance / Tearing Fix
#################################

use-damage = true;
unredir-if-possible = false;

#################################
# Optional Effects
#################################

shadow = false;
#fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
# Misc
#################################

detect-client-opacity = true;

